<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Assignment Showcase</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:#111;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .container{
      width:100%;
      max-width:900px;
    }

    h1{
      font-size:60px;
      margin-bottom:40px;
    }

    .projects{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:#1f1f1f;
      padding:30px;
      border-radius:20px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h2{
      margin-bottom:10px;
    }

    .card a{
      display:inline-block;
      margin-top:20px;
      text-decoration:none;
      color:#ffd400;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>My Assignment Projects</h1>

    <div class="projects">

      <div class="card">
        <h2>Pokemon Landing</h2>

        <p>
        Pokemon landing page UI.
        </p>

        <a href="./AssignmentOne/index.html">
          View Project →
        </a>
      </div>

      <div class="card">
        <h2>Astro Landing</h2>

        <p>
        Astro landing page UI.
        </p>

        <a href="./AssignmentTwo/index.html">
          View Project →
        </a>
      </div>
      <div class="card">
        <h2>shinsei village</h2>

        <p>
        Shinsei village landing page UI.
        </p>

        <a href="./AssignmentThree/index.html">
          View Project →
        </a>
      </div>

    </div>

  </div>

</body>
</html>
